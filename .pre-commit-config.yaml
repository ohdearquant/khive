# Pre-commit hooks for khive.
# Install: uv tool install pre-commit && pre-commit install
# Run on all files: pre-commit run --all-files

repos:
  # General hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
        exclude: ^(frontend/tsconfig\.json|.*\.code-workspace)$
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # Python: ruff (lint + format)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^server/
      - id: ruff-format
        files: ^server/

  # Rust: rustfmt + clippy
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'cd crates && cargo fmt --all -- --check'
        language: system
        files: ^crates/.*\.rs$
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'cd crates && cargo clippy --workspace --all-targets -- -D warnings'
        language: system
        files: ^crates/.*\.rs$
        pass_filenames: false
      - id: lint-sql
        name: lint sql
        entry: sh scripts/lint-sql.sh
        language: system
        files: ^crates/.*\.sql$
        pass_filenames: false
      - id: lint-adr-refs
        name: lint ADR references
        entry: sh scripts/lint-adr-refs.sh
        language: system
        files: ^(docs/.*\.md|crates/(.*/docs/.*\.md|.*/design[^/]*\.md))$
        pass_filenames: false

  # TypeScript / Next.js: eslint + prettier (run via pnpm)
  - repo: local
    hooks:
      - id: pnpm-lint
        name: pnpm lint (frontend)
        entry: bash -c 'cd frontend && pnpm lint'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
      - id: pnpm-format-check
        name: pnpm format check (frontend)
        entry: bash -c 'cd frontend && pnpm format:check'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|css|md|json)$
        pass_filenames: false

  # Markdown / docs: deno fmt (config at repo-root deno.json)
  - repo: local
    hooks:
      - id: deno-fmt-docs
        name: deno fmt (markdown + docs)
        entry: deno fmt --check
        language: system
        files: ^(docs/.*\.md|README\.md|CLAUDE\.md|AGENTS\.md)$
        pass_filenames: false

  # JSON/JSONL data-leak guard
  # Catches corpus files that check-added-large-files (<512KB) and gitleaks both miss:
  # any .jsonl/.ndjson outside bench paths, and .json > 256KB that isn't a lockfile.
  - repo: local
    hooks:
      - id: check-json-data
        name: JSON/JSONL data-leak guard
        entry: bash scripts/check-json-data.sh
        language: system
        files: '\.(json|jsonl|ndjson)$'
        pass_filenames: false

  # Secrets scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

# Skip slow hooks on commit, only run on push
default_stages: [pre-commit]
fail_fast: false
