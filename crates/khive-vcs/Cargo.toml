[package]
name = "khive-vcs"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "KG versioning — git-native core types, canonical hash, and NDJSON-to-SQLite sync (ADR-010/ADR-020)"

[dependencies]
khive-runtime = { version = "0.2.10", path = "../khive-runtime" }
khive-storage = { version = "0.2.10", path = "../khive-storage" }
khive-types = { version = "0.2.10", path = "../khive-types" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
tokio = { workspace = true }
anyhow = { workspace = true }
tempfile = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }
khive-vcs-adapters = { version = "0.2.10", path = "../khive-vcs-adapters" }
