[package]
name = "khive-vamana"
description = "Batch-built Vamana ANN index for pre-normalized vector search."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true

[lib]
bench = false

[features]
default = ["parallel", "mmap"]
parallel = ["dep:rayon", "khive-quant/parallel"]
mmap = ["dep:memmap2", "dep:uuid"]

[dependencies]
rayon = { workspace = true, optional = true }
memmap2 = { workspace = true, optional = true }
bytemuck = { workspace = true }
rand = { version = "0.8", default-features = false, features = ["std_rng"] }
serde = { workspace = true }
thiserror = { workspace = true }
blake3 = { workspace = true }
uuid = { workspace = true, optional = true }
khive-quant = { version = "0.6.0", path = "../khive-quant", default-features = false }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = [
    "Wdk_Foundation",
    "Wdk_Storage_FileSystem",
    "Win32_Foundation",
    "Win32_Security",
    "Win32_Storage_FileSystem",
    "Win32_System_IO",
    "Win32_System_WindowsProgramming",
] }

[dev-dependencies]
blake3 = { workspace = true }
tempfile = { workspace = true }
criterion = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }

[[bench]]
name = "vamana_bench"
harness = false

[[example]]
name = "vec_bench"
required-features = ["mmap"]
