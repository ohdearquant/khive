name: Bench Trend Tracking

# Informational trend tracking for BOTH component (Criterion) and e2e
# (pipeline / bench-1m synthetic) benchmarks. Per the bench-program spec
# (.khive/workspaces/20260710/bench-program/SPEC-draft.md, "Blocking-promotion
# ladder"): every metric here is Advisory - measured, appended to
# bench-data/<suite>.jsonl on the `perf-data` branch, and rendered as a trend
# summary. Nothing in this workflow asserts pass/fail or sets a threshold;
# that requires K>=10 same-SHA calibration (scripts/perf/bench_calibrate.py)
# plus a >=2-week zero-alarm observation window before any promotion
# conversation starts. This workflow is Wave 2's ledger-writer, not a gate.
#
# Efficiency and coverage:
#   - PRs run only affected Criterion components. The stable component jobs
#     resolve as skipped when their crate/hotpath mapping has no changes, so
#     required checks never disappear behind workflow-level path filtering.
#   - The full four-component + e2e suite runs only after pushes to main and
#     release tags. Criterion remains quick-profile and wall-clock bounded.
#   - A single repository variable (`BENCH_TRACK_DISABLED`) skips all bench
#     work while leaving the PR change-detection check visible.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "crates/**"
      - "scripts/perf/**"
      - "scripts/bench_1m.sh"
      - ".github/workflows/bench-track.yml"
      - ".github/workflows/bench-component.yml"
  # Do not path-filter the workflow itself: a required selector check must be
  # created even when every component resolves to skipped.
  pull_request:

# Workflow-level default is read-only. `contents: write` is granted only to
# component/e2e jobs that may push to `perf-data`; PR tokens remain subject to
# GitHub's normal fork permission downgrade, and PR component jobs never call
# the publisher.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  PERF_DATA_BRANCH: perf-data
  BENCH_BOT_NAME: khive-bench-bot
  BENCH_BOT_EMAIL: khive-bench-bot@users.noreply.github.com

concurrency:
  # A main/release push owns a SHA-specific group so a merge burst cannot
  # replace an older pending data point. The publisher already retries
  # perf-data push races, so overlapping push runs remain lossless. PR runs
  # stay ref-grouped and superseded measurements may be cancelled to avoid
  # wasting runners.
  group: bench-track-${{ github.event_name }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # PR component selector. Each component owns the five crates from one old
  # shard. The explicit shared files are registered benchmark hotpaths: a
  # change to the workspace graph, tracker/publisher, or workflow can affect
  # every component. An unmatched PR path sets no component output, and all
  # four component jobs skip without doing setup or bench work.
  # ─────────────────────────────────────────────────────────────────────────
  changes:
    name: Select changed benchmark components
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      scoring_retrieval: ${{ steps.paths.outputs.scoring_retrieval }}
      ann_query: ${{ steps.paths.outputs.ann_query }}
      storage_brain: ${{ steps.paths.outputs.storage_brain }}
      packs: ${{ steps.paths.outputs.packs }}

    steps:
      - uses: actions/checkout@v7
        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 0

      - name: Map changed paths to components
        id: paths
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          scoring_retrieval=false
          ann_query=false
          storage_brain=false
          packs=false
          all_components=false

          # Fail closed: a process-substitution `< <(git diff ...)` failure is
          # invisible to `set -euo pipefail` (the subshell's exit status never
          # reaches the script). Capture the diff to a file first and check
          # its exit status explicitly, so an unavailable/malformed base or
          # head object trips all_components instead of silently leaving
          # every component flag false.
          diff_file="$(mktemp)"
          if ! git diff --name-only "$BASE_SHA...$HEAD_SHA" > "$diff_file"; then
            echo "::warning::git diff failed for $BASE_SHA...$HEAD_SHA; treating as all-components (fail closed)"
            all_components=true
          fi

          # An empty diff for two distinct SHAs is also unsafe: it should
          # never happen for a real PR range, so treat it the same as a
          # diff failure rather than silently skipping every component.
          if [ "$all_components" != true ] && [ ! -s "$diff_file" ] && [ "$BASE_SHA" != "$HEAD_SHA" ]; then
            echo "::warning::git diff returned no output for distinct SHAs $BASE_SHA...$HEAD_SHA; treating as all-components (fail closed)"
            all_components=true
          fi

          if [ "$all_components" != true ]; then
            while IFS= read -r path; do
              case "$path" in
                crates/khive-score/*|crates/khive-fusion/*|crates/khive-retrieval/*|crates/khive-text/*|crates/khive-bm25/*)
                  scoring_retrieval=true
                  ;;
                crates/khive-hnsw/*|crates/khive-vamana/*|crates/khive-quant/*|crates/khive-query/*|crates/khive-request/*)
                  ann_query=true
                  ;;
                crates/khive-db/*|crates/khive-fold/*|crates/khive-brain-core/*|crates/khive-pack-comm/*)
                  storage_brain=true
                  ;;
                crates/khive-pack-gtd/*|crates/khive-pack-kg/*|crates/khive-pack-memory/*|crates/khive-pack-schedule/*)
                  packs=true
                  ;;
                crates/Cargo.toml|crates/Cargo.lock|scripts/perf/bench_track.py|scripts/perf/bench_calibrate.py|scripts/perf/publish_ledger.sh|scripts/bench_1m.sh|.github/workflows/bench-track.yml|.github/workflows/bench-component.yml)
                  all_components=true
                  ;;
              esac
            done < "$diff_file"
          fi

          if [ "$all_components" = true ]; then
            scoring_retrieval=true
            ann_query=true
            storage_brain=true
            packs=true
          fi

          {
            echo "scoring_retrieval=$scoring_retrieval"
            echo "ann_query=$ann_query"
            echo "storage_brain=$storage_brain"
            echo "packs=$packs"
          } >> "$GITHUB_OUTPUT"

  component-scoring-retrieval:
    name: Component benches / scoring-retrieval
    needs: changes
    if: >-
      vars.BENCH_TRACK_DISABLED != 'true' &&
      (github.event_name == 'push' || needs.changes.outputs.scoring_retrieval == 'true')
    permissions:
      contents: write
      issues: write
    uses: ./.github/workflows/bench-component.yml
    with:
      component: scoring-retrieval
      crates: khive-score khive-fusion khive-retrieval khive-text khive-bm25

  component-ann-query:
    name: Component benches / ann-query
    needs: changes
    if: >-
      vars.BENCH_TRACK_DISABLED != 'true' &&
      (github.event_name == 'push' || needs.changes.outputs.ann_query == 'true')
    permissions:
      contents: write
      issues: write
    uses: ./.github/workflows/bench-component.yml
    with:
      component: ann-query
      crates: khive-hnsw khive-vamana khive-quant khive-query khive-request

  component-storage-brain:
    name: Component benches / storage-brain
    needs: changes
    if: >-
      vars.BENCH_TRACK_DISABLED != 'true' &&
      (github.event_name == 'push' || needs.changes.outputs.storage_brain == 'true')
    permissions:
      contents: write
      issues: write
    uses: ./.github/workflows/bench-component.yml
    with:
      component: storage-brain
      crates: khive-db khive-fold khive-brain-core khive-pack-comm

  component-packs:
    name: Component benches / packs
    needs: changes
    if: >-
      vars.BENCH_TRACK_DISABLED != 'true' &&
      (github.event_name == 'push' || needs.changes.outputs.packs == 'true')
    permissions:
      contents: write
      issues: write
    uses: ./.github/workflows/bench-component.yml
    with:
      component: packs
      crates: khive-pack-gtd khive-pack-kg khive-pack-memory khive-pack-schedule
      # The packs bench-target compile alone runs ~16m (issue #940); the
      # default 20m budget killed the Criterion step mid-run on every main
      # push and the ledger steps skipped, leaving the trend data packs-blind.
      timeout_minutes: 40

  # ─────────────────────────────────────────────────────────────────────────
  # e2e benches: the pipeline daemon suite (bench_calibrate's `pipeline`
  # extractor, reused not duplicated) plus the hermetic bench-1m synthetic
  # gate, run once as an informational data point. Advisory ledgers:
  # bench-data/pipeline.jsonl, bench-data/bench-1m.jsonl
  # ─────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E benches (pipeline + bench-1m synthetic)
    runs-on: ubuntu-latest
    if: vars.BENCH_TRACK_DISABLED != 'true' && github.event_name == 'push'
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy

      - name: Pin the real toolchain bin on PATH
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
          cache-on-failure: true

      - uses: astral-sh/setup-uv@v5

      - name: Build kkernel (bench-embedder feature)
        run: |
          set -euo pipefail
          cargo build --release -p kkernel --features bench-embedder --manifest-path crates/Cargo.toml
          cp crates/target/release/kkernel crates/target/release/kkernel-bench

      - name: Record pipeline suite (single informational run)
        id: record_pipeline
        env:
          KKERNEL_BENCH_BINARY: crates/target/release/kkernel-bench
        # Captures bench_track.py's own exit code instead of failing the
        # step outright (this step failing before publish ran meant an
        # already-written error record never reached perf-data). See the
        # "Fail job" step at the end of this job.
        run: |
          set +e
          python3 scripts/perf/bench_track.py record \
            --suite pipeline \
            --source calibrate \
            --sha "$GITHUB_SHA" \
            --branch "$GITHUB_REF_NAME" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --data-dir bench-data \
            --summary-out /tmp/pipeline-trend.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run hermetic bench-1m synthetic gate (informational, --runs 1)
        id: bench_1m
        # Same hermetic synthetic path bench-1m.yml's blocking ann-ci-gate
        # uses (seed=42, no SIFT download) - runnable on standard runners,
        # so it runs here too, but only ever informational: this workflow
        # never asserts pass/fail on its output, only records it.
        #
        # bench_1m.sh exits 1 on a measured assertion regression (its own
        # blocking-gate behavior, reused here) - `set +e` + an explicit rc
        # capture (not `|| true`, which would discard the code entirely)
        # keeps this step green so the NEXT step (recording) always runs,
        # while still carrying the real exit code into the ledger as an
        # advisory field instead of silently dropping the regression.
        run: |
          set +e
          bash scripts/bench_1m.sh --ci-synthetic
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Record bench-1m suite (single informational run)
        id: record_bench_1m
        run: |
          set +e
          python3 scripts/perf/bench_track.py record \
            --suite bench-1m \
            --source json \
            --json-file target/bench-out/SIFT-CI-synthetic.json \
            --sha "$GITHUB_SHA" \
            --branch "$GITHUB_REF_NAME" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --data-dir bench-data \
            --gate-exit-code "${{ steps.bench_1m.outputs.exit_code }}" \
            --summary-out /tmp/bench-1m-trend.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish ledgers to perf-data branch
        if: ${{ !cancelled() }}
        run: bash scripts/perf/publish_ledger.sh bench-data/pipeline.jsonl bench-data/bench-1m.jsonl

      - name: Write step summary
        if: always()
        run: |
          cat /tmp/pipeline-trend.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          cat /tmp/bench-1m-trend.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      - name: Upload raw e2e output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-track-e2e-${{ github.run_id }}
          path: |
            perf/pipeline-ledger.csv
            target/bench-out/SIFT-CI-synthetic.json
            perf/ci-synthetic-ledger.csv
          retention-days: 90
          if-no-files-found: ignore

      # Advisory-lane semantics: see the components job note above. Exit 0.
      - name: Warn if trend ledger record errored (advisory, never fails)
        if: ${{ !cancelled() && (steps.record_pipeline.outputs.exit_code != '0' || steps.record_bench_1m.outputs.exit_code != '0') }}
        env:
          PIPELINE_EXIT_CODE: ${{ steps.record_pipeline.outputs.exit_code }}
          BENCH_1M_RECORD_EXIT_CODE: ${{ steps.record_bench_1m.outputs.exit_code }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          MSG="bench_track.py record failed: pipeline exit=${PIPELINE_EXIT_CODE} bench-1m exit=${BENCH_1M_RECORD_EXIT_CODE}; status=error record(s) were still published to perf-data. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          echo "::warning::${MSG}"
          {
            echo "## Trend ledger record errored (advisory)"
            echo ""
            echo "${MSG}"
          } >> "$GITHUB_STEP_SUMMARY"
          TRACKING_ISSUE=863
          if ! gh issue reopen "$TRACKING_ISSUE" --repo "$GITHUB_REPOSITORY" 2>/dev/null; then
            echo "tracking issue already open or reopen unavailable (non-fatal)"
          fi
          if ! gh issue comment "$TRACKING_ISSUE" --repo "$GITHUB_REPOSITORY" --body "$MSG"; then
            echo "::warning::tracking-issue comment failed (non-fatal)"
          fi
          exit 0
