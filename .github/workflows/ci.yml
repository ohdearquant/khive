name: CI

on:
  push:
    branches: [main, "integration/**"]
  pull_request:
    branches: [main, "integration/**"]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy
      - name: Pin the real toolchain bin on PATH
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
          cache-on-failure: true
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: ../scripts/ci.sh

  supply-chain:
    name: Supply-chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: crates/Cargo.toml
          command: check bans licenses sources
      # Advisories run separately with continue-on-error because cargo-deny 0.18.x
      # cannot parse CVSS 4.0 advisories added to the RustSec DB in 2026
      # (e.g. RUSTSEC-2026-0073 for libcrux-poly1305, which is not in khive's dep
      # tree).  Remove continue-on-error once cargo-deny is updated to support
      # CVSS 4.0, or once the advisory DB no longer carries that format for our deps.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: crates/Cargo.toml
          command: check advisories
        continue-on-error: true

  data-leak-guard:
    name: JSON/JSONL data-leak guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan whole tree for corpus files
        run: bash scripts/check-json-data.sh --all

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Scan git history for credentials
        run: gitleaks detect --source . --redact --no-banner

  docs:
    name: Docs lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check markdown formatting
        run: deno fmt --check

  marketplace:
    name: Marketplace example validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate marketplace SKILL/agent verb examples
        run: python3 marketplace/_validators/check_examples.py
