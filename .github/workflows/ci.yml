name: CI

on:
  push:
    branches: [main, "integration/**"]
  # Keep pull_request (not pull_request_target): GitHub's first-time-contributor
  # approval gate must remain in front of workflows from external forks.
  pull_request:
    branches: [main, "integration/**"]
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  # timeout-minutes starts after a runner is assigned; it bounds stuck execution,
  # but GitHub does not apply it while a job is still queued.
  automerge-push-guard:
    name: Auto-merge push guard
    # Run immediately from the synchronize payload. Comparing enabledAt with
    # the push-time PR update makes reruns idempotent and prevents a request
    # deliberately re-armed after review from being disabled by a delayed
    # runner. CI gate depends on this job, so mutation failure is fail-closed.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'synchronize' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.type == 'User' &&
      github.event.pull_request.auto_merge != null
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # disablePullRequestAutoMerge needs contents: write in addition to
      # pull-requests: write — with contents: read the mutation is rejected
      # ("Resource not accessible by integration") and, because this job
      # fail-closes into the CI gate, every push to an armed PR turned the
      # gate red even after re-review (first hit: PR #1054, 2026-07-17).
      contents: write
      pull-requests: write
    steps:
      - name: Disable stale auto-merge request
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PUSH_UPDATED_AT: ${{ github.event.pull_request.updated_at }}
        run: |
          set -euo pipefail

          # Re-read current state because the request may have been disabled or
          # deliberately re-armed while this job waited for a runner.
          # shellcheck disable=SC2016
          pr_json="$(gh api graphql \
            -f query='query($owner: String!, $name: String!, $number: Int!) {
              repository(owner: $owner, name: $name) {
                pullRequest(number: $number) {
                  id
                  autoMergeRequest { enabledAt }
                }
              }
            }' \
            -f owner="$REPOSITORY_OWNER" \
            -f name="$REPOSITORY_NAME" \
            -F number="$PR_NUMBER")"

          current_enabled_at="$(jq -r '.data.repository.pullRequest.autoMergeRequest.enabledAt // empty' <<<"$pr_json")"
          if [ -z "$current_enabled_at" ]; then
            echo "Auto-merge is already disabled for PR #${PR_NUMBER}."
            exit 0
          fi
          enabled_epoch="$(date --date="$current_enabled_at" +%s)"
          push_epoch="$(date --date="$PUSH_UPDATED_AT" +%s)"
          if [ "$enabled_epoch" -gt "$push_epoch" ]; then
            echo "Auto-merge was re-armed after this push; preserving the reviewed request."
            exit 0
          fi

          pull_request_id="$(jq -r '.data.repository.pullRequest.id' <<<"$pr_json")"
          # shellcheck disable=SC2016
          gh api graphql \
            -f query='mutation($pullRequestId: ID!) {
              disablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId}) {
                pullRequest { number }
              }
            }' \
            -f pullRequestId="$pull_request_id" >/dev/null

          {
            echo "### Auto-merge disabled"
            echo
            echo "PR #${PR_NUMBER} received a new push. Re-review it before arming auto-merge again."
          } >> "$GITHUB_STEP_SUMMARY"

  ci:
    name: CI
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      # A fast failure cancels the sibling OS to control runner cost. The tradeoff
      # is that a macOS-only failure may need a second run after Linux is fixed.
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: crates
    env:
      # PRs use a focused macOS portability lane. Push, nightly, and manually
      # dispatched runs retain the full suite on both operating systems.
      CI_SUITE: ${{ github.event_name == 'pull_request' && matrix.os == 'macos-latest' && 'macos-pr' || 'full' }}
      # CI gates do not need full debuginfo. line-tables-only keeps file:line
      # in test backtraces while cutting most of the target-dir and linker
      # footprint that filled the ubuntu runner disk (ENOSPC surfaces as
      # `ld terminated with signal 7 [Bus error]`, e.g. run 28604091732).
      CARGO_PROFILE_DEV_DEBUG: line-tables-only
    steps:
      - uses: actions/checkout@v7
      # ubuntu-latest runners start with ~21GB free on /. The workspace's
      # check + clippy + test + release passes exceed that, and ld's mmap'd
      # writes turn ENOSPC into SIGBUS. Purge preinstalled toolchains this
      # repo never uses (Android, .NET, GHC, CodeQL, docker images) to
      # reclaim ~25GB before the build starts.
      - name: Free runner disk (Linux)
        if: runner.os == 'Linux'
        run: |
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy
      - name: Pin the real toolchain bin on PATH
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
          cache-on-failure: true
          # Cache key bump: artifacts built with full debuginfo predate the
          # line-tables-only profile; restoring them would defeat the disk cap.
          key: line-tables
      - uses: denoland/setup-deno@v2
        if: env.CI_SUITE == 'full'
        with:
          deno-version: v2.x
      - uses: astral-sh/setup-uv@v5
        if: env.CI_SUITE == 'full'
      # SECURITY ORDERING (#560): the placeholder-stub scan runs before any cargo
      # phase so no PR-controlled build script or proc-macro executes before the
      # guard; it reads the pristine checkout. Keep this step ahead of every cargo
      # step below, and ungated: both suites compile PR-controlled code, so gating
      # the scan to one suite leaves the other lane unguarded.
      - name: No-stub placeholder scan (before any cargo)
        run: ../scripts/ci.sh no-stubs-scan
      - name: macOS PR compile check
        if: env.CI_SUITE == 'macos-pr'
        run: ../scripts/ci.sh macos-pr-check
      - name: macOS PR platform tests
        if: env.CI_SUITE == 'macos-pr'
        run: ../scripts/ci.sh macos-pr-tests
      - name: Lockfile freshness
        if: env.CI_SUITE == 'full'
        run: ../scripts/ci.sh lockfile
      - name: Forward-deployed crate checks
        if: env.CI_SUITE == 'full'
        run: ../scripts/ci.sh forward-deployed
      - name: Format, SQL, and ADR lints
        if: env.CI_SUITE == 'full'
        run: ../scripts/ci.sh lint
      - name: No-stub guard
        if: env.CI_SUITE == 'full'
        run: ../scripts/ci.sh no-stubs
      - name: Clippy
        if: env.CI_SUITE == 'full'
        run: ../scripts/ci.sh clippy
      # Rustdoc is already the separately gated doc-build job below; keep it in
      # ci.sh's local all-mode without paying for duplicate per-OS CI builds.
      - name: Workspace tests
        if: env.CI_SUITE == 'full'
        run: ../scripts/ci.sh tests
      - name: No-default-features check
        if: env.CI_SUITE == 'full'
        run: ../scripts/ci.sh no-default-features
      - name: Release build
        if: env.CI_SUITE == 'full'
        run: ../scripts/ci.sh release
      - name: Contract tests
        if: env.CI_SUITE == 'full'
        run: ../scripts/ci.sh contract-tests
      - name: Deno tests
        if: env.CI_SUITE == 'full'
        run: ../scripts/ci.sh deno-tests
      - name: Smoke tests
        if: env.CI_SUITE == 'full'
        run: ../scripts/ci.sh smoke-tests
      - name: Vector smoke test
        if: env.CI_SUITE == 'full'
        run: ../scripts/ci.sh vector-smoke
      - name: khive-contract suite
        if: env.CI_SUITE == 'full'
        run: ../scripts/ci.sh contract-suite

  supply-chain:
    name: Supply-chain (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      # cargo-deny 0.19.9+ parses CVSS 4.0 entries in the 2026 RustSec DB;
      # 0.18.x fails to load the DB entirely. One pinned binary runs every check
      # class so the supply-chain gate cannot drift between two implementations.
      # The installer action is pinned to an immutable commit SHA (not the mutable
      # @v2 tag), and the next step ASSERTS the resolved version is exactly 0.19.9
      # before gating. In an autonomous-merge model logs are not review: if the
      # installer ever drifts (tag moves, binstall fallback resolves a different
      # build), the assertion fails the job rather than silently gating with the
      # wrong binary.
      - name: Install pinned cargo-deny (0.19.9)
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-deny@0.19.9
      - name: cargo-deny 0.19.9 (hard gate)
        run: |
          test "$(cargo-deny --version)" = "cargo-deny 0.19.9"
          cargo deny --manifest-path crates/Cargo.toml --all-features check bans licenses sources advisories

  data-leak-guard:
    name: JSON/JSONL data-leak guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Scan whole tree for corpus files
        run: bash scripts/check-json-data.sh --all

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Scan git history for credentials
        run: gitleaks detect --source . --redact --no-banner

  docs:
    name: Docs lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check markdown formatting
        run: deno fmt --check

  marketplace:
    name: Marketplace example validator
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate marketplace SKILL/agent verb examples
        run: python3 marketplace/_validators/check_examples.py

  doc-build:
    name: Doc build (-D warnings)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
          cache-on-failure: true
      - name: Build docs (deny warnings)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --workspace

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Declare the read scope the action needs explicitly so the gate does not
    # depend on ambient GITHUB_TOKEN defaults (an org policy could tighten them).
    # No pull-requests:write — comment-summary-in-pr is not enabled.
    permissions:
      contents: read
    # This action only works on pull_request events — it diffs the dependency
    # graph between the base and head commits.  Skip on push to main/integration.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on high or critical vulnerabilities only; low/moderate are
          # informational to avoid blocking on transitive noise.
          fail-on-severity: high
          # Mirror the license allow-list from crates/deny.toml so the two
          # gates stay consistent.  GPL/LGPL/AGPL are implicitly denied because
          # they are absent from the allow list.
          allow-licenses: >-
            Apache-2.0, Apache-2.0 WITH LLVM-exception, MIT, ISC, BSD-2-Clause,
            BSD-3-Clause, Unicode-3.0, Zlib, MIT-0, BSL-1.0, 0BSD, CC0-1.0,
            Unlicense, MPL-2.0, CDLA-Permissive-2.0
          # typing-extensions (transitive via anyio/referencing in the
          # khive-contract suite) is PSF-licensed (Python-2.0), a permissive
          # license. dependency-review mis-detects its metadata as containing
          # GPL-1.0-or-later — a known false positive for this package. Scope the
          # exception to exactly this purl so the allow-list above is unchanged
          # for everything else.
          #
          # sqlite-vec is dual-licensed MIT OR Apache-2.0 (both already in the
          # allow-list above), but dependency-review's SPDX parser cannot parse
          # its combined license string and tags it LicenseRef-bad-mitapache-2.0.
          # Our own cargo-deny gate (crates/deny.toml) already accepts it. Once
          # crates/Cargo.lock is committed (#992), the full cargo tree becomes
          # visible to dependency-review permanently, so this scoped exemption is
          # durable infrastructure rather than a temporary workaround.
          allow-dependencies-licenses: pkg:pypi/typing-extensions, pkg:cargo/sqlite-vec

  wasm-parity:
    name: wasm-parity (khive-changeset)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: wasm32-unknown-unknown,wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
          cache-on-failure: true
      # Pinned exact version (same rationale as the cargo-deny/gitleaks pins
      # above): a wasm-parity gate's tooling must not silently drift.
      - name: Install wasmtime (pinned)
        run: |
          set -o pipefail
          curl https://wasmtime.dev/install.sh -sSf | bash -s -- --version v46.0.1
          "$HOME/.wasmtime/bin/wasmtime" --version
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"
      - name: wasm32-unknown-unknown compile check (ADR-101 D5)
        run: cargo check -p khive-changeset --target wasm32-unknown-unknown
      # ADR-101 D5 requires CI to run the SAME test suite against native and
      # wasm32 and fail on any divergence. wasm32-unknown-unknown has no
      # standalone test-execution story (no stdout/process without extra JS
      # tooling this repo does not otherwise depend on), so the actual
      # execution leg runs under wasm32-wasip1 via a wasmtime runner — real
      # wasm32 execution, not a native-only substitute. See crate README.md.
      - name: Native test run
        run: |
          set -o pipefail
          cargo test -p khive-changeset 2>&1 | tee /tmp/native.log
      - name: wasm32-wasip1 test run
        env:
          CARGO_TARGET_WASM32_WASIP1_RUNNER: "wasmtime run --wasi preview2 --"
        run: |
          set -o pipefail
          cargo test -p khive-changeset --target wasm32-wasip1 2>&1 | tee /tmp/wasm.log
      - name: Assert native/wasm32 test-suite parity
        run: |
          grep -E '^test .* \.\.\. (ok|FAILED)$' /tmp/native.log | sort > /tmp/native.sorted
          grep -E '^test .* \.\.\. (ok|FAILED)$' /tmp/wasm.log | sort > /tmp/wasm.sorted
          if [ ! -s /tmp/native.sorted ]; then
            echo "native run produced no parsed 'test ... ok/FAILED' lines" >&2
            exit 1
          fi
          if ! diff -u /tmp/native.sorted /tmp/wasm.sorted; then
            echo "native and wasm32-wasip1 test results diverge (see diff above)" >&2
            exit 1
          fi
          echo "native and wasm32-wasip1: $(wc -l < /tmp/native.sorted) tests, identical pass/fail results"

  vamana-portability:
    name: vamana portability (ADR-110 Layer A)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
          cache-on-failure: true
      - name: wasm32 core compile check
        run: cargo check --target wasm32-unknown-unknown -p khive-quant -p khive-vamana --no-default-features
      - name: Native sequential and owned-storage tests
        run: cargo test -p khive-quant -p khive-vamana --no-default-features

  minio-blob-compat:
    name: MinIO BlobStore compatibility (ADR-111 Amendment 2)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v7
      # Gate on storage-layer changes only: the MinIO leg (container start,
      # image pull) is the slowest part of this job, and most PRs never touch
      # the blob store. `git diff` against the PR base (or the pushed range
      # on a direct push) decides whether the rest of the job runs at all.
      - name: Determine whether storage crates changed
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ] || ! git cat-file -e "$base" 2>/dev/null; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "no comparable base SHA -- running the MinIO leg to be safe"
            exit 0
          fi
          if git diff --name-only "$base" HEAD -- .. | grep -qE '^(crates/khive-db/|crates/khive-storage/|docs/adr/ADR-111)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: dtolnay/rust-toolchain@1.94.1
        if: steps.changed.outputs.run == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.changed.outputs.run == 'true'
        with:
          workspaces: crates
          cache-on-failure: true
      # `docker run` rather than a `services:` container: MinIO's image needs
      # `server /data` as its command, and GitHub Actions service containers
      # cannot override the image's default command/entrypoint.
      #
      # Pinned to an immutable digest (H3 fix round 2), matching the repo's
      # own supply-chain-pin convention (see the `supply-chain` job above).
      # Resolved 2026-07-16 from the `minio/minio:latest` manifest list via
      # `registry-1.docker.io`'s `Docker-Content-Digest` response header
      # (`docker.io/v2/minio/minio/manifests/latest`). Both the server
      # container below and the `mc` client image in the next step pin the
      # same digest.
      - name: Start pinned MinIO
        if: steps.changed.outputs.run == 'true'
        run: |
          docker run -d --name khive-minio -p 9000:9000 \
            -e MINIO_ROOT_USER=khive-ci \
            -e MINIO_ROOT_PASSWORD=khive-ci-secret \
            minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e \
            server /data
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:9000/minio/health/live >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "MinIO did not become healthy in time" >&2
          docker logs khive-minio || true
          exit 1
      - name: Create the conformance bucket
        if: steps.changed.outputs.run == 'true'
        run: |
          docker run --rm --network host --entrypoint /bin/sh \
            minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e -c \
            "mc alias set ci http://127.0.0.1:9000 khive-ci khive-ci-secret && \
             mc mb --ignore-existing ci/khive-blob-conformance"
      - name: Shared BlobStore conformance suite against MinIO
        if: steps.changed.outputs.run == 'true'
        env:
          KHIVE_S3_TEST_ENDPOINT: http://127.0.0.1:9000
          KHIVE_S3_TEST_BUCKET: khive-blob-conformance
          KHIVE_S3_TEST_REGION: us-east-1
          AWS_ACCESS_KEY_ID: khive-ci
          AWS_SECRET_ACCESS_KEY: khive-ci-secret
        run: cargo test -p khive-db --test blob_conformance
      - name: Stop MinIO
        if: always() && steps.changed.outputs.run == 'true'
        run: docker rm -f khive-minio || true

  check-windows:
    name: Windows compile check
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
          cache-on-failure: true
      # 0.5.0 release blocker: khive-runtime/khive-mcp's daemon subsystem must
      # compile on x86_64-pc-windows-msvc (the npm package's Windows target).
      # Not (yet) a required check in branch protection — plain `cargo check`
      # (no --all-targets) keeps this fast while the Windows lane is new;
      # widen once it has proven stable.
      - name: cargo check --workspace (Windows)
        run: cargo check --workspace

  coverage-ratchet:
    name: Coverage ratchet
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Read-only gate: fails a PR whose line coverage regresses below the committed
    # baseline (coverage-baseline.txt). It does NOT push to main — the baseline is
    # raised only by an explicit PR that edits coverage-baseline.txt, so every
    # change to main (the floor included) goes through the gate wall. Auto-pushing
    # a ratchet commit would require a direct-to-main write path that bypasses the
    # required-checks wall, which the autonomous-merge model (ADR-066) forbids;
    # under that model the bot is not a ruleset bypass actor, so the push would be
    # rejected and fail the job on every merge.
    steps:
      - uses: actions/checkout@v7
      # `cargo llvm-cov --workspace` is the disk-heaviest command in CI: it
      # instruments every crate and emits per-object profraw files on top of the
      # normal target dir, overflowing the ubuntu runner's ~21GB and surfacing as
      # `No space left on device`. The matrix `ci` job already purges the unused
      # preinstalled toolchains to reclaim ~25GB; this gate needs the same purge.
      - name: Free runner disk (Linux)
        if: runner.os == 'Linux'
        run: |
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
          cache-on-failure: true
          cache-targets: false
      # Pinned to a commit SHA, not the mutable @v2 tag (same rationale as the
      # #215 cargo-deny installer pin): a required gate's tooling must not drift.
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-llvm-cov
      - name: Compute coverage
        working-directory: crates
        run: |
          # Extract TOTAL *line* coverage from the structured JSON export, not by
          # column position. In `--summary-only` text the TOTAL row has Regions%
          # in field 4 and Lines% in field 10, so the prior `awk '{print $4}'`
          # silently gated on REGION coverage while logs claimed line coverage.
          # `.data[0].totals.lines.percent` is unambiguous and format-stable.
          cargo llvm-cov --workspace --summary-only --json > /tmp/cov.json
          CURRENT=$(jq -r '.data[0].totals.lines.percent' /tmp/cov.json)
          echo "Current line coverage: ${CURRENT}%"
          echo "CURRENT_COVERAGE=${CURRENT}" >> "$GITHUB_ENV"
      - name: Check coverage does not regress
        run: |
          BASELINE=$(cat coverage-baseline.txt | tr -d '[:space:]')
          CURRENT="${CURRENT_COVERAGE}"
          echo "Baseline: ${BASELINE}%  Current: ${CURRENT}%"
          # Allow 0.1 percentage-point measurement noise (compiler non-determinism).
          python3 -c "
          import sys
          baseline = float('${BASELINE}')
          current  = float('${CURRENT}')
          epsilon  = 0.1
          if current < baseline - epsilon:
              print(f'FAIL: coverage dropped {baseline:.2f}% -> {current:.2f}%  (epsilon={epsilon}%)')
              sys.exit(1)
          print(f'OK: {current:.2f}% >= {baseline:.2f}% - {epsilon}% threshold')
          "

  # Single aggregate context for branch protection. Requiring this one job
  # (instead of raw matrix job names like "CI (macos-latest)") keeps the
  # required set stable across matrix changes and stays skip-aware:
  # dependency-review only runs on pull_request events, so its "skipped"
  # result on push must not fail the gate. Anything other than
  # success/skipped (failure, cancelled) fails the gate.
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - automerge-push-guard
      - ci
      - supply-chain
      - data-leak-guard
      - secret-scan
      - docs
      - marketplace
      - doc-build
      - dependency-review
      - coverage-ratchet
      - wasm-parity
      - vamana-portability
      - minio-blob-compat
    if: always()
    steps:
      - name: Check aggregated job results
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          bad=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result != "success" and .value.result != "skipped") | .key')
          if [ -n "$bad" ]; then
            echo "Gate failure — jobs not green: $bad"
            exit 1
          fi
          echo "All gated jobs green (or legitimately skipped)."
