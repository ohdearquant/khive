name: CI

on:
  push:
    branches: [main, "integration/**"]
  pull_request:
    branches: [main, "integration/**"]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy
      - name: Pin the real toolchain bin on PATH
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
          cache-on-failure: true
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: ../scripts/ci.sh

  supply-chain:
    name: Supply-chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: crates/Cargo.toml
          command: check bans licenses sources
      # Advisory/CVE gate: cargo-deny 0.19.9+ parses CVSS 4.0 entries in the 2026
      # RustSec DB (0.18.x fails to load the DB entirely).  Pin deny-version so this
      # step uses a known-good binary and gates hard — no continue-on-error.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: crates/Cargo.toml
          command: check advisories
          deny-version: "0.19.9"

  data-leak-guard:
    name: JSON/JSONL data-leak guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan whole tree for corpus files
        run: bash scripts/check-json-data.sh --all

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Scan git history for credentials
        run: gitleaks detect --source . --redact --no-banner

  docs:
    name: Docs lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Check markdown formatting
        run: deno fmt --check

  marketplace:
    name: Marketplace example validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate marketplace SKILL/agent verb examples
        run: python3 marketplace/_validators/check_examples.py

  semver-checks:
    name: SemVer checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check semver (all published workspace crates)
        # Pinned to a commit SHA, not the mutable @v2 tag: under autonomous merge
        # the required check IS the reviewer, so its implementation must not drift
        # outside this repo (same rationale as the #215 cargo-deny installer pin).
        uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2.9
        with:
          manifest-path: crates/Cargo.toml
          # No `package:` scope — gate the whole publishable workspace. Nearly all
          # members (khive-types, khive-runtime, khive-pack-kg, …) are live on
          # crates.io at 0.2.11, and khive-mcp re-exports runtime types, so a break
          # in a lib crate that does not surface through khive-mcp would otherwise
          # slip past this required check. cargo-semver-checks compares each member
          # against its crates.io baseline; every member is published, so there is
          # no missing-baseline error.

  doc-build:
    name: Doc build (-D warnings)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
          cache-on-failure: true
      - name: Build docs (deny warnings)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --workspace

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    # Declare the read scope the action needs explicitly so the gate does not
    # depend on ambient GITHUB_TOKEN defaults (an org policy could tighten them).
    # No pull-requests:write — comment-summary-in-pr is not enabled.
    permissions:
      contents: read
    # This action only works on pull_request events — it diffs the dependency
    # graph between the base and head commits.  Skip on push to main/integration.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on high or critical vulnerabilities only; low/moderate are
          # informational to avoid blocking on transitive noise.
          fail-on-severity: high
          # Mirror the license allow-list from crates/deny.toml so the two
          # gates stay consistent.  GPL/LGPL/AGPL are implicitly denied because
          # they are absent from the allow list.
          allow-licenses: >-
            Apache-2.0, Apache-2.0 WITH LLVM-exception, MIT, ISC, BSD-2-Clause,
            BSD-3-Clause, Unicode-3.0, Zlib, MIT-0, BSL-1.0, 0BSD, CC0-1.0,
            Unlicense, MPL-2.0, CDLA-Permissive-2.0

  coverage-ratchet:
    name: Coverage ratchet
    runs-on: ubuntu-latest
    # Read-only gate: fails a PR whose line coverage regresses below the committed
    # baseline (coverage-baseline.txt). It does NOT push to main — the baseline is
    # raised only by an explicit PR that edits coverage-baseline.txt, so every
    # change to main (the floor included) goes through the gate wall. Auto-pushing
    # a ratchet commit would require a direct-to-main write path that bypasses the
    # required-checks wall, which the autonomous-merge model (ADR-066) forbids;
    # under that model the bot is not a ruleset bypass actor, so the push would be
    # rejected and fail the job on every merge.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
          cache-on-failure: true
      # Pinned to a commit SHA, not the mutable @v2 tag (same rationale as the
      # #215 cargo-deny installer pin): a required gate's tooling must not drift.
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-llvm-cov
      - name: Compute coverage
        working-directory: crates
        run: |
          # Extract TOTAL *line* coverage from the structured JSON export, not by
          # column position. In `--summary-only` text the TOTAL row has Regions%
          # in field 4 and Lines% in field 10, so the prior `awk '{print $4}'`
          # silently gated on REGION coverage while logs claimed line coverage.
          # `.data[0].totals.lines.percent` is unambiguous and format-stable.
          cargo llvm-cov --workspace --summary-only --json > /tmp/cov.json
          CURRENT=$(jq -r '.data[0].totals.lines.percent' /tmp/cov.json)
          echo "Current line coverage: ${CURRENT}%"
          echo "CURRENT_COVERAGE=${CURRENT}" >> "$GITHUB_ENV"
      - name: Check coverage does not regress
        run: |
          BASELINE=$(cat coverage-baseline.txt | tr -d '[:space:]')
          CURRENT="${CURRENT_COVERAGE}"
          echo "Baseline: ${BASELINE}%  Current: ${CURRENT}%"
          # Allow 0.1 percentage-point measurement noise (compiler non-determinism).
          python3 -c "
          import sys
          baseline = float('${BASELINE}')
          current  = float('${CURRENT}')
          epsilon  = 0.1
          if current < baseline - epsilon:
              print(f'FAIL: coverage dropped {baseline:.2f}% -> {current:.2f}%  (epsilon={epsilon}%)')
              sys.exit(1)
          print(f'OK: {current:.2f}% >= {baseline:.2f}% - {epsilon}% threshold')
          "
