name: Release

# Triggered ONLY by manual workflow_dispatch from `main` (see #222). A version
# tag push does NOT publish: an old `v*` tag checks out an older release.yml whose
# SemVer gate predates #216, so tag-triggered publishing is an ungated path. Making
# main-dispatch the sole publisher means "the workflow that publishes" always equals
# "the gate-carrying workflow on main". The `publish` environment's ref allowlist is
# restricted to `main` (scripts/apply-autonomous-merge.sh), so even if an old tag's
# old workflow runs, its publish job cannot deploy.
#
# Builds Rust binaries per-platform, publishes each khive-kernel-{platform}
# npm subpackage, then publishes the umbrella khive package.
#
# Per ADR-026 §"Atomic release semantics": all subpackage publishes must
# succeed before the umbrella publishes. This is enforced by separating the
# workflow into two phases:
#
#   Phase 1 (build-platform matrix): compile binaries, stage into subpackage
#     bin/, remove .gitkeep, and upload the whole subpackage as a GH Actions
#     artifact. No `npm publish` happens here.
#
#   Phase 2 (publish-all, single job): downloads all six platform artifacts,
#     updates versions, publishes the six subpackages, then publishes the
#     umbrella — in a single sequential job. If any subpackage publish fails,
#     the umbrella is never published. Because publishing is serialised in one
#     job, partial failure cannot leave mismatched versions permanently on the
#     registry (any already-published subpackage can be unpublished within 72h
#     via `npm unpublish` before the version is re-released).
#
# This satisfies the ADR guarantee: partial failure leaves the user able to
# install the previous khive version unchanged.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (without v prefix, e.g. 0.2.4)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Phase 1: Build Rust binaries per platform and upload as GH artifacts.
  # No npm publish happens here — that is deferred to Phase 2.
  # ─────────────────────────────────────────────────────────────────────────
  build-platform:
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: darwin-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            cross: false

          - platform: darwin-x64
            os: macos-latest
            target: x86_64-apple-darwin
            cross: false

          - platform: linux-x64-gnu
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false

          - platform: linux-x64-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross: true

          - platform: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true

          - platform: win32-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild (cross-compile targets only)
        if: ${{ matrix.cross }}
        run: pip3 install ziglang && cargo install cargo-zigbuild

      - name: Build binaries (native)
        if: ${{ !matrix.cross }}
        working-directory: crates
        run: |
          cargo build --release --target ${{ matrix.target }} -p kkernel

      - name: Build binaries (zigbuild cross)
        if: ${{ matrix.cross }}
        working-directory: crates
        # sqlite-vec 0.1.9 uses BSD-style `u_int*_t` typedefs that musl libc
        # does not provide (glibc only exposes them via _BSD_SOURCE). Inject
        # the typedefs via CFLAGS so the C build succeeds under zig+musl.
        env:
          CFLAGS_x86_64_unknown_linux_musl: "-Du_int8_t=uint8_t -Du_int16_t=uint16_t -Du_int32_t=uint32_t -Du_int64_t=uint64_t"
          CFLAGS_aarch64_unknown_linux_gnu: "-Du_int8_t=uint8_t -Du_int16_t=uint16_t -Du_int32_t=uint32_t -Du_int64_t=uint64_t"
        run: |
          cargo zigbuild --release --target ${{ matrix.target }} -p kkernel

      - name: Stage binaries into subpackage bin/
        shell: bash
        run: |
          PKG_DIR="npm/kernel-${{ matrix.platform }}/bin"
          SRC="crates/target/${{ matrix.target }}/release"
          # Remove the placeholder so it is not shipped in the published tarball (MIN-1).
          rm -f "${PKG_DIR}/.gitkeep"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "${SRC}/kkernel.exe" "${PKG_DIR}/kkernel.exe"
          else
            cp "${SRC}/kkernel" "${PKG_DIR}/kkernel"
            chmod +x "${PKG_DIR}/kkernel"
          fi

      - name: Upload subpackage artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.platform }}
          path: npm/kernel-${{ matrix.platform }}/
          # Retain for 1 day — only needed during this release run.
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Release-time SemVer gate (ADR-066 §3). The per-PR semver job was removed in
  # #216: cargo-semver-checks compares each crate against its crates.io baseline
  # at the SAME version, so on a fixed mid-cycle dev version it is permanently
  # red and can never anchor the autonomous-merge wall. It belongs HERE, where
  # the version actually bumps and the API delta must match the bump. publish-all
  # depends on this job, so a semver-incoherent tag cannot publish. The crates.io
  # library-publish path (scripts/publish.sh) runs the same check independently.
  # ─────────────────────────────────────────────────────────────────────────
  semver-gate:
    name: SemVer gate (release)
    runs-on: ubuntu-latest
    steps:
      # A manual workflow_dispatch can select any ref. Only `main` is allowed to
      # cut a release, so the SemVer gate that runs is always main's current one —
      # never an older ref whose release.yml predates this gate. Tag pushes no
      # longer trigger this workflow at all (the push.tags trigger was removed in
      # #222), so workflow_dispatch from main is the sole publish path. publish-all
      # depends on this job, so a blocked dispatch never reaches a publish step.
      - name: Guard — manual dispatch only from main
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main' }}
        run: |
          echo "::error::workflow_dispatch is only permitted from refs/heads/main (got ${{ github.ref }})." >&2
          echo "Manual releases must dispatch from main so the current SemVer gate applies." >&2
          exit 1
      - uses: actions/checkout@v4
      - name: Check semver vs crates.io baseline
        # Pinned to a commit SHA, not the mutable @v2 tag (same drift rationale
        # as the #215 cargo-deny installer pin): a release gate must not drift.
        uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2.9
        with:
          manifest-path: crates/Cargo.toml
          # khive-quant (SQ8 codecs) has never been published, so it has no
          # crates.io baseline and makes the check un-runnable if left in scope.
          # Drop it from `exclude:` once it is first published to gate it too.
          exclude: khive-quant

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 2: Publish all subpackages + umbrella atomically in a single job.
  # Runs only after ALL Phase 1 jobs succeed (needs: build-platform with
  # fail-fast: true propagates any single failure here) and the release SemVer
  # gate passes.
  # ─────────────────────────────────────────────────────────────────────────
  publish-all:
    needs: [build-platform, semver-gate]
    runs-on: ubuntu-latest
    # ADR-066 release gate: in the autonomous-merge model the human approval
    # moves from per-PR to per-release. This job publishes to npm; the
    # 'publish' environment carries a required reviewer (Ocean), so even an
    # automated or accidental tag pauses here until a human authorizes the
    # deployment. The environment is created by scripts/apply-autonomous-merge.sh
    # (STEP=release-gate). Until that runs, the gate is dormant (the environment
    # auto-creates unprotected on first use) — apply the release gate before
    # flipping the ruleset to zero approvals.
    environment: publish

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Version comes from the required workflow_dispatch input (tag-push publishing
      # was removed in #222). Passed via env var to avoid shell-interpolation issues
      # in node -e (MIN-3).
      - name: Extract version
        run: |
          echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"

      # Download all six platform artifacts into their respective directories.
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          # Download to npm/ — each artifact named kernel-{platform} lands in
          # npm/kernel-{platform}/ matching the checkout layout.
          path: npm/
          # pattern matches kernel-* artifacts from Phase 1
          pattern: kernel-*

      # actions/checkout@v4 above restored npm/kernel-*/bin/.gitkeep (it's tracked
      # in git so the bin/ dirs exist for new clones). actions/download-artifact
      # does not delete it. Remove it here so the published tarball ships only
      # the platform binary, not the placeholder. (NEW-1 round-2 fix.)
      - name: Remove .gitkeep placeholders before publish
        run: rm -f npm/kernel-*/bin/.gitkeep

      # Set the version in each subpackage's package.json.
      # VERSION and PKG_JSON are passed via env vars to avoid shell-interpolation
      # of special characters inside the node -e script (MIN-3).
      - name: Set subpackage versions
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-x64-musl linux-arm64 win32-x64; do
            PKG_JSON="npm/kernel-${platform}/package.json" VERSION="${{ env.VERSION }}" node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync(process.env.PKG_JSON));
              pkg.version = process.env.VERSION;
              fs.writeFileSync(process.env.PKG_JSON, JSON.stringify(pkg, null, 2) + '\n');
            "
          done

      # Publish all six subpackages. If any fails, subsequent steps (including
      # umbrella publish) do not run. GitHub Actions sequential steps in a
      # single job guarantee this ordering.
      - name: Publish @khive-ai/kernel-darwin-arm64
        working-directory: npm/kernel-darwin-arm64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @khive-ai/kernel-darwin-x64
        working-directory: npm/kernel-darwin-x64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @khive-ai/kernel-linux-x64-gnu
        working-directory: npm/kernel-linux-x64-gnu
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @khive-ai/kernel-linux-x64-musl
        working-directory: npm/kernel-linux-x64-musl
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @khive-ai/kernel-linux-arm64
        working-directory: npm/kernel-linux-arm64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @khive-ai/kernel-win32-x64
        working-directory: npm/kernel-win32-x64
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Only reached if all six subpackage publishes succeeded.
      - name: Set umbrella version and pin subpackage versions
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('npm/package.json'));
            pkg.version = process.env.VERSION;
            for (const k of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[k] = process.env.VERSION;
            }
            fs.writeFileSync('npm/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish khive (umbrella)
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
