name: pages

# Builds a static docs site from docs/guide/*.md and README.md using Jekyll's
# GitHub Pages Actions build (no bundled framework, no npm/node toolchain).
#
# Layout: remote_theme just-the-docs (GitHub-Pages-compatible via the
# jekyll-remote-theme gem bundled in the github-pages gem group that
# actions/jekyll-build-pages installs) gives every page a left sidebar nav,
# built-in search, and consistent typography. Sidebar order comes from each
# page's `nav_order` front matter, injected below from the NAV_ORDER table.
#
# Agent-fetchable outputs, generated from the same docs/guide sources so
# nothing can drift out of sync:
#   - /llms.txt       — short project summary + linked index of every doc page
#   - /llms-full.txt  — full concatenated markdown of every doc page
#   - /md/<name>.md   — raw (unconverted) markdown copy of every doc page
#
# GitHub Pages source is set to "GitHub Actions" (Settings > Pages); this
# workflow deploys on every push that touches docs/guide/**.

on:
  push:
    branches: [main]
    paths:
      - "docs/guide/**"
      - "README.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  SITE_URL: "https://ohdearquant.github.io/khive"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble Jekyll source from docs/guide
        run: |
          set -euo pipefail
          SRC=_site_src
          rm -rf "$SRC" _raw_md
          # Raw agent-fetchable markdown is staged OUTSIDE the Jekyll source and
          # copied into the built site after the Jekyll step. If it lives inside
          # the source, the github-pages gem's jekyll-optional-front-matter +
          # jekyll-titles-from-headings plugins promote each raw file into a
          # titled page, which duplicates every entry in the sidebar nav.
          mkdir -p "$SRC" _raw_md

          cat > "$SRC/_config.yml" <<'EOF'
          title: khive
          description: "A typed knowledge graph runtime for AI agents, over MCP."
          url: "https://ohdearquant.github.io"
          baseurl: "/khive"
          remote_theme: just-the-docs/just-the-docs
          plugins:
            - jekyll-remote-theme
          markdown: kramdown
          kramdown:
            input: GFM
          search_enabled: true
          heading_anchors: true
          color_scheme: khive
          nav_sort: case_insensitive
          back_to_top: true
          back_to_top_text: "Back to top"
          footer_content: "khive is licensed under the Business Source License 1.1. Agents: fetch <a href=\"/khive/llms.txt\">/llms.txt</a> or <a href=\"/khive/llms-full.txt\">/llms-full.txt</a> for a machine-readable index."
          aux_links:
            "GitHub":
              - "https://github.com/ohdearquant/khive"
            "crates.io":
              - "https://crates.io/crates/khive-mcp"
            "Discord":
              - "https://discord.gg/JDj9ENhUE8"
            "llms.txt":
              - "/khive/llms.txt"
          aux_links_new_tab: true
          EOF

          # Custom color scheme: neutral blue accents replacing the theme's
          # default purple palette. The palette vars are declared !default in
          # just-the-docs, so assignments here win; $link-color and
          # $btn-primary-color are re-declared too because the light scheme
          # derives them from the purple palette at its own load time.
          mkdir -p "$SRC/_sass/color_schemes"
          cat > "$SRC/_sass/color_schemes/khive.scss" <<'EOF'
          $purple-000: #2b6cb0;
          $purple-100: #0969da;
          $purple-200: #0550ae;
          $purple-300: #033d8b;
          $link-color: #0969da;
          $btn-primary-color: #0969da;
          $sidebar-color: #f7f9fb;
          EOF

          # basename -> "nav_order|Title|one-line description used in llms.txt"
          # Order matches Ocean's requested sidebar: Getting Started, Knowledge
          # Graph Modeling, Memory, Search, Tasks, Prompt Cookbook, API Reference.
          declare -A NAV_ORDER=(
            [getting-started]="2|Getting Started|Install, connect an MCP client, and run your first khive session."
            [request-and-dsl]="3|Request and the Verb-Dispatch DSL|The single request tool: input forms, parallel batches, chains, and the result envelope."
            [knowledge-graph]="4|Knowledge Graph Modeling|Entity kinds, edge relations, and modeling patterns for the KG substrate."
            [memory]="5|Memory and Recall|Episodic vs semantic memory, salience, and decay-weighted recall."
            [search]="6|Search and Retrieval|FTS5, vector search, hybrid fusion, and reranking."
            [tasks]="7|GTD Task Management|Task lifecycle, priorities, and dependency edges."
            [communication]="8|Communication and Email|Actor-addressed messaging, threading, and the optional email channel."
            [sessions-and-ingest]="9|Agent Sessions and Data Ingest|Session record verbs and provider transcript mirror ingest."
            [specialized-packs]="10|Specialized Packs|Niche packs beyond the production set, starting with the formal-math pack."
            [prompt-cookbook]="11|Prompt Cookbook|Ready-to-use verb patterns for common agent workflows."
            [tips-and-tricks]="12|Tips and Tricks|Query craft, DSL round-trips, param gotchas, and troubleshooting for the request tool."
            [proof-graph-case-study]="13|Proof Graph Case Study|Mathlib ingested as a 320K-entity, 4.4M-edge khive graph: ingestion path and traversal at scale."
            [api-reference]="14|API Reference|Full verb catalog for all 9 production packs: params, DSL examples, response envelope."
          )

          cat > "$SRC/index.md" <<'EOF'
          ---
          layout: home
          title: khive
          nav_order: 1
          description: "A research knowledge graph runtime for AI agents, over a single MCP tool."
          ---

          # khive

          A research knowledge graph runtime for agents that need structure: typed substrates,
          closed taxonomies, and a verb-consolidated MCP surface.

          Vector search finds similar text. A knowledge graph finds structure: lineages,
          dependencies, contradictions, gaps. khive gives an agent a typed, queryable graph that
          grows as it works.

          [crates.io](https://crates.io/crates/khive-mcp) &middot;
          [GitHub](https://github.com/ohdearquant/khive) &middot;
          [License: BUSL-1.1](https://github.com/ohdearquant/khive/blob/main/LICENSE)

          ## For AI agents

          - [`/llms.txt`](llms.txt): short project summary + a linked index of every doc page
          - [`/llms-full.txt`](llms-full.txt): every doc page, concatenated, in one fetch
          - [`/md/*.md`](md/getting-started.md): raw, unconverted markdown for each page (also
            linked from the bottom of every page)

          ## Documentation

          - [Getting Started](getting-started.html): install, connect, first session
          - [Knowledge Graph Modeling](knowledge-graph.html): entity kinds, edge relations, modeling patterns
          - [Memory and Recall](memory.html): episodic vs semantic, salience, decay
          - [Search and Retrieval](search.html): FTS, vector, hybrid fusion, reranking
          - [GTD Task Management](tasks.html): task lifecycle, priorities, dependencies
          - [Prompt Cookbook](prompt-cookbook.html): ready-to-use verb patterns
          - [API Reference](api-reference.html): full verb catalog, params, DSL examples

          ## Demos

          Runnable transcripts, captured against a scratch database, in the repo's
          [`demos/`](https://github.com/ohdearquant/khive/tree/main/demos) directory:

          - [research-ingest](https://github.com/ohdearquant/khive/blob/main/demos/research-ingest.md): create entities, link them, search, and traverse the graph
          - [gtd-memory](https://github.com/ohdearquant/khive/blob/main/demos/gtd-memory.md): task lifecycle and salience-weighted memory recall

          ## Install

          ```bash
          cargo install kkernel
          ```

          `kkernel` is the single shipped binary; `kkernel mcp` serves the MCP `request` surface.
          Full install and MCP client setup: [Getting Started](getting-started.html).

          ## Reference

          - [AGENTS.md](https://github.com/ohdearquant/khive/blob/main/AGENTS.md): full verb reference for agents using khive
          EOF

          # Per-guide-page assembly: inject nav_order/title/description front matter,
          # rewrite in-repo relative links to the site's flat .html layout (links
          # outside docs/guide go to their GitHub blob URL; external links untouched),
          # and stage a raw copy in _raw_md/ (outside the Jekyll source so the theme
          # never promotes it to a nav page); a post-build step copies these into
          # _site/md/ for agent-fetchable raw markdown.
          #
          # This loop is also the single source for llms.txt / llms-full.txt below:
          # PAGE_TITLE/PAGE_DESC/PAGE_ORDER_LIST are populated here and reused there,
          # so a new docs/guide/*.md file (with a NAV_ORDER entry) propagates to the
          # HTML sidebar, /md/ copy, llms.txt, and llms-full.txt with no second list
          # to maintain.
          declare -A PAGE_TITLE
          declare -A PAGE_DESC
          PAGE_ORDER_LIST=()
          for f in docs/guide/*.md; do
            base=$(basename "$f" .md)
            [ "$base" = "README" ] && continue

            entry="${NAV_ORDER[$base]:-}"
            if [ -z "$entry" ]; then
              echo "ERROR: docs/guide/${base}.md has no NAV_ORDER entry in pages.yml — every guide page must be added to NAV_ORDER (ADR-090 §3)." >&2
              exit 1
            fi
            nav_order="${entry%%|*}"
            rest="${entry#*|}"
            title="${rest%%|*}"
            description="${rest#*|}"
            PAGE_TITLE[$base]="$title"
            PAGE_DESC[$base]="$description"
            PAGE_ORDER_LIST+=("${nav_order}|${base}")

            {
              echo "---"
              echo "layout: default"
              echo "title: \"${title}\""
              echo "nav_order: ${nav_order}"
              [ -n "$description" ] && echo "description: \"${description}\""
              echo "---"
              echo
              echo "<!-- Raw markdown: ${SITE_URL}/md/${base}.md -->"
              echo
              sed -E \
                -e 's#\]\(\.\./\.\./([A-Za-z0-9_./-]+)\)#](https://github.com/ohdearquant/khive/blob/main/\1)#g' \
                -e 's#\]\(\.\./README\.md([^)]*)\)#](index.html\1)#g' \
                -e 's#\]\(([A-Za-z0-9_-]+)\.md([^)]*)\)#](\1.html\2)#g' \
                "$f"
              echo
              echo "---"
              echo
              echo "Raw markdown for this page: [/md/${base}.md](${SITE_URL}/md/${base}.md)"
            } > "$SRC/$base.md"

            # Raw copy for agents — staged outside the Jekyll source and copied
            # into the built site post-build (see the step after Build with
            # Jekyll), so the github-pages gem cannot promote it into a page.
            cp "$f" "_raw_md/$base.md"
          done

          # Ordered basenames for the agent-surface indexes below, derived from
          # the same PAGE_ORDER_LIST the HTML/raw-copy loop above just built
          # (nav_order, then basename, ascending) — not a separately maintained
          # list.
          mapfile -t ORDERED_BASENAMES < <(printf '%s\n' "${PAGE_ORDER_LIST[@]}" | sort -t'|' -k1,1n -k2,2 | cut -d'|' -f2)

          # llms.txt — the llms.txt convention: short summary + linked index,
          # HTML and raw-markdown URLs for every page.
          {
            echo "# khive"
            echo
            echo "> A research knowledge graph runtime for AI agents: typed entities, a closed"
            echo "> 17-relation edge ontology, hybrid FTS+vector search, and GQL/SPARQL queries,"
            echo "> all dispatched through one MCP tool (\`request\`). 74 verbs across 9 packs."
            echo
            echo "## Docs"
            echo
            echo "- [Home](${SITE_URL}/): project overview, install, demos ([markdown](${SITE_URL}/md/index.md))"
            for base in "${ORDERED_BASENAMES[@]}"; do
              title="${PAGE_TITLE[$base]}"
              description="${PAGE_DESC[$base]}"
              echo "- [${title}](${SITE_URL}/${base}.html): ${description} ([markdown](${SITE_URL}/md/${base}.md))"
            done
            echo
            echo "## Reference"
            echo
            echo "- [AGENTS.md](https://raw.githubusercontent.com/ohdearquant/khive/main/AGENTS.md): full verb reference for agents using khive"
            echo "- [llms-full.txt](${SITE_URL}/llms-full.txt): every doc page above, concatenated into one fetch"
          } > "$SRC/llms.txt"

          # /llm.txt — singular alias; agents and humans guess both spellings.
          cp "$SRC/llms.txt" "$SRC/llm.txt"

          # Raw markdown copy of the homepage too, matching the /md/<base>.md
          # convention for every other page — strip the front matter block.
          # Taken BEFORE the footer append below, so the raw copy stays the
          # page's own content only, same as every other page's _raw_md/*.md.
          awk 'BEGIN{n=0} /^---$/{n++; next} n>=2{print}' "$SRC/index.md" > "_raw_md/index.md"

          # Raw-markdown footer link, appended to the HTML source only (not
          # the raw copy above) — mirrors the footer every guide page gets in
          # its assembly step.
          {
            echo
            echo "---"
            echo
            echo "Raw markdown for this page: [/md/index.md](md/index.md)"
          } >> "$SRC/index.md"

          # llms-full.txt — full concatenated markdown of every doc page,
          # including Home (front-matter-stripped, reusing the same
          # _raw_md/index.md produced above for the raw-markdown copy).
          {
            echo "# khive — full documentation"
            echo
            echo "Concatenated from ${SITE_URL}/ and every page below. Generated from docs/guide/*.md; do not edit directly."
            echo
            echo "---"
            echo
            echo "## Home"
            echo
            echo "Source: ${SITE_URL}/"
            echo
            cat "_raw_md/index.md"
            for base in "${ORDERED_BASENAMES[@]}"; do
              title="${PAGE_TITLE[$base]}"
              echo
              echo "---"
              echo
              echo "## ${title}"
              echo
              echo "Source: ${SITE_URL}/${base}.html"
              echo
              cat "docs/guide/${base}.md"
            done
          } > "$SRC/llms-full.txt"

          # Enforce that every guide page the HTML/raw-copy loop built is actually
          # present in both agent indexes — this is the assertion for the ADR-090 §2
          # claim ("appears in the llms.txt index, llms-full.txt, and its own
          # /md/<page>.md copy"). A future regression that reintroduces a separately
          # maintained page list fails the build instead of silently drifting.
          for base in "${ORDERED_BASENAMES[@]}"; do
            grep -qF "${base}.html" "$SRC/llms.txt" || {
              echo "ERROR: ${base} missing from llms.txt (ADR-090 §2)" >&2
              exit 1
            }
            grep -qF "${base}.html" "$SRC/llms-full.txt" || {
              echo "ERROR: ${base} missing from llms-full.txt (ADR-090 §2)" >&2
              exit 1
            }
          done

          # Manifest of every raw-markdown basename this build produced (Home plus
          # every guide page), consumed by the post-build step below so its
          # existence check covers all of them, not a hard-coded sample.
          printf '%s\n' index "${ORDERED_BASENAMES[@]}" > _raw_md/.manifest

          echo "Assembled site source:"
          find "$SRC" -maxdepth 2 -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: _site_src
          destination: _site

      - name: Add raw markdown copies to built site
        # Post-build so Jekyll never sees these files (they would otherwise be
        # promoted into titled pages and duplicate the sidebar nav). The Jekyll
        # container writes _site as root, hence sudo.
        run: |
          set -euo pipefail
          sudo mkdir -p _site/md
          sudo cp _raw_md/*.md _site/md/
          # Existence check over every basename the assemble step recorded (Home
          # plus every guide page), not a two-page spot check — a missing raw
          # copy for any page fails the build (ADR-090 §2).
          while IFS= read -r base; do
            test -f "_site/md/${base}.md" || {
              echo "ERROR: _site/md/${base}.md missing after raw-markdown copy (ADR-090 §2)" >&2
              exit 1
            }
          done < _raw_md/.manifest

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
