# perf/targets.toml — scale-proof assertion thresholds
# Changes that loosen any threshold require a PR comment from lambda:khive citing the cause.
#
# Threshold format: hard limit with optional relative tolerance (fractional).
# A tolerance of 0.10 means:
#   for <=: measured <= threshold * 1.10 = PASS
#   for >=: measured >= threshold * 0.90 = PASS

[scale-proof]
# -------------------------------------------------------------------
# Target 1: khive-real-384 (production workload, 3-point 100K/200K/500K)
#
# Measured baselines (probe-results-khive-real-3pt.json, 2026-06-14):
#   recall@10:  0.9907 / 0.9899 / 0.9875  (all well above 0.95)
#   beam:       64 (floor) at all 3 N — exponent ≈ 0.0
#   query p50:  283–330 µs  (well below 600 µs)
#   query p95:  359–455 µs  (well below 900 µs)
#   speedup:    12–57x at 100K–500K
#
# Thresholds set from measured values with headroom as noted.
# -------------------------------------------------------------------

[[scale-proof.target]]
name = "khive-vamana/scale-proof/khive-real-384"

  # Scaling criteria — no tolerance; these are structural invariants.
  # Measured: recall 0.987–0.991 @500K; threshold 0.95 gives ample margin.
  [[scale-proof.target.check]]
  metric = "recall_at_10"
  scope = "all_rows"
  operator = ">="
  threshold = 0.95
  tolerance = 0.0

  # Measured beam exponent ≈ 0.0 (pinned at floor 64 across all N).
  # Threshold 0.5 is generous; even 0.3 would pass.
  [[scale-proof.target.check]]
  metric = "beam_growth_exponent"
  scope = "fits"
  operator = "<="
  threshold = 0.5
  tolerance = 0.0

  # Measured query exponent ≈ 0.04 (R²=0.20, nearly flat).
  # Threshold 0.8 is generous; even 0.3 would pass.
  [[scale-proof.target.check]]
  metric = "iso_recall_query_exponent_warm"
  scope = "fits"
  operator = "<"
  threshold = 0.8
  tolerance = 0.0

  # Measured speedup at max_n (500K): 57x. Threshold 10x is a conservative floor.
  [[scale-proof.target.check]]
  metric = "speedup_vs_brute_force"
  scope = "max_n"
  operator = ">="
  threshold = 10.0
  tolerance = 0.0

  # Latency regression gates — 10% tolerance for hardware variance.
  # Measured p50 at 500K: 307 µs. Threshold 600 µs = ~2x headroom.
  [[scale-proof.target.check]]
  metric = "query_warm_p50_us"
  scope = "max_n"
  operator = "<="
  threshold = 600.0
  tolerance = 0.10

  # Measured p95 at 500K: 403 µs. Threshold 900 µs = ~2.2x headroom.
  # FLAG: λ-review — p95 threshold set from 500K measurement (403 µs) with 2.2x margin.
  # If the 1M khive-real run is added later, tighten or re-measure.
  [[scale-proof.target.check]]
  metric = "query_warm_p95_us"
  scope = "max_n"
  operator = "<="
  threshold = 900.0
  tolerance = 0.10

# -------------------------------------------------------------------
# Target 2: SIFT-1M (reproducible 1M proof; 128-dim, 3-point 100K/316K/1M)
#
# Measured baselines (sift-1m-honest-3pt.json, 2026-06-15, sha eb6696c):
#   recall@10:  0.9504 / 0.9523 / 0.9521  (all >= 0.95)
#   beam:       30 / 43 / 49  (exponent = 0.213, R²=0.932)
#   query p50:  71 / 130 / 171 µs  (well below 600 µs)
#   query p95:  93 / 177 / 216 µs  (well below 900 µs)
#   speedup:    89 / 153 / 341x vs scalar brute-force
#
# Updated from PR #137 stale estimates to actual honest-3pt measured values.
# -------------------------------------------------------------------

[[scale-proof.target]]
name = "khive-vamana/1m-scale-proof/sift-1m"

  [[scale-proof.target.check]]
  metric = "recall_at_10"
  scope = "all_rows"
  operator = ">="
  threshold = 0.95
  tolerance = 0.0

  # Measured SIFT beam exponent = 0.213 (3-point, 100K–1M, R²=0.932).
  # Threshold 0.5 passes with margin; 0.213 < 0.5.
  [[scale-proof.target.check]]
  metric = "beam_growth_exponent"
  scope = "fits"
  operator = "<="
  threshold = 0.5
  tolerance = 0.0

  # Measured SIFT query exponent = 0.381 (3-point, iso-recall warm, R²=0.955).
  # Threshold 0.8 gives headroom; 0.381 < 0.8.
  [[scale-proof.target.check]]
  metric = "iso_recall_query_exponent_warm"
  scope = "fits"
  operator = "<"
  threshold = 0.8
  tolerance = 0.0

  # Measured SIFT speedup at 1M: 341x vs naive scalar L2 brute-force.
  # Threshold 10x is a conservative floor to catch regressions.
  [[scale-proof.target.check]]
  metric = "speedup_vs_brute_force"
  scope = "max_n"
  operator = ">="
  threshold = 10.0
  tolerance = 0.0

  # Measured SIFT p50 @1M: 171 µs. Threshold 600 µs = ~3.5x headroom.
  [[scale-proof.target.check]]
  metric = "query_warm_p50_us"
  scope = "max_n"
  operator = "<="
  threshold = 600.0
  tolerance = 0.10

  # Measured SIFT p95 @1M: 216 µs. Threshold 900 µs = ~4.2x headroom.
  [[scale-proof.target.check]]
  metric = "query_warm_p95_us"
  scope = "max_n"
  operator = "<="
  threshold = 900.0
  tolerance = 0.10

# -------------------------------------------------------------------
# Target 3: ci-synthetic/clustered-128 — per-PR STRUCTURAL ANN regression gate
#
# This is a HERMETIC, DETERMINISTIC gate that runs on every PR touching
# crates/khive-vamana/**. It uses synthetic clustered vectors generated
# by scripts/perf/gen_synthetic_fvecs.py (stdlib-only Python, seed=42,
# no network, no committed binary data) with:
#   n=50000 base vectors, 1000 queries, dim=128, 64 clusters, sigma=0.08
#
# Purpose: structural regression detection — catches index-build or
# search breakage (e.g. recall collapse, speedup regression). It does
# NOT prove real-SIFT quality; that is the banked workflow_dispatch job.
#
# Because vec_bench computes ground truth by brute-force internally on
# the same synthetic dataset, recall@10 is ANN-vs-brute-force on self-
# consistent data. On clusterable (low-intrinsic-dim) data, ANN recall
# is high; a drop signals structural breakage.
#
# Measured baselines (gen_synthetic_fvecs.py --n 50000 --seed 42,
# vec_bench --ns 10000,50000, 2026-06-18 on macOS arm64):
#   recall@10:     0.9522 @ N=10000  /  0.9531 @ N=50000
#   beam:          14 @ N=10000  /  26 @ N=50000
#   beam exponent: 0.3846 (2-point fit)
#   speedup:       76x @ N=10000  /  69x @ N=50000
#   p50:           8 µs @ N=10000  /  46 µs @ N=50000
#   p95:           10 µs @ N=10000  /  69 µs @ N=50000
#
# NOTE: iso_recall_query_exponent_warm is NOT checked here. At small N
# (10K/50K) query latency is near-linear even for a correct index, so
# the exponent check would always fail. Sublinear scaling is verified by
# the banked SIFT-1M job.
#
# NOTE: Latency thresholds are NOT checked here. Shared CI runners have
# high and variable latency; structural breakage shows up in recall, not
# in µs numbers. p50/p95 are tracked in ci-synthetic-ledger.csv for
# trend analysis but are not gated.
# -------------------------------------------------------------------

[[scale-proof.target]]
name = "khive-vamana/ci-synthetic/clustered-128"

  # Primary structural gate: recall must stay above this floor at all N.
  # NOTE: reported recall (~0.952) is the recall AT the iso-recall beam, which
  # vec_bench binary-searches to hit TARGET_RECALL=0.95 — so it sits at ~0.95
  # by construction, NOT as free headroom. The real margin to the 0.90 floor is
  # ~0.05. That is sufficient: a genuine structural regression collapses recall
  # far below 0.90 (empirically ~0.675 at max_degree=4, ~0.01 at degree 3),
  # well clear of any runner-to-runner clustering variation.
  [[scale-proof.target.check]]
  metric = "recall_at_10"
  scope = "all_rows"
  operator = ">="
  threshold = 0.90
  tolerance = 0.0

  # Beam growth: exponent < 0.6 confirms beam does not explode with N.
  # Measured: 0.385 (2-point fit). Threshold 0.6 is generous but still
  # catches a runaway-beam regression that would make CI very slow.
  [[scale-proof.target.check]]
  metric = "beam_growth_exponent"
  scope = "fits"
  operator = "<="
  threshold = 0.6
  tolerance = 0.0

  # ANN must beat brute-force at max_n (N=50000). Measured: 69x.
  # Threshold 5.0x is a very conservative floor; anything below it
  # indicates the ANN search itself is broken or degenerate.
  [[scale-proof.target.check]]
  metric = "speedup_vs_brute_force"
  scope = "max_n"
  operator = ">="
  threshold = 5.0
  tolerance = 0.0
