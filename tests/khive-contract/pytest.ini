[pytest]
addopts = -ra --strict-config --strict-markers
testpaths = tests
markers =
    adr_001: ADR-001 entity kind taxonomy
    adr_002: ADR-002 edge ontology
    adr_003: ADR-003 namespace isolation
    adr_007: ADR-007 namespace isolation
    adr_008: ADR-008 query layer
    adr_013: ADR-013 note kind taxonomy
    adr_014: ADR-014 curation operations
    adr_015: ADR-015 schema migrations
    adr_016: ADR-016 request DSL
    adr_017: ADR-017 pack standard and verb registry
    adr_019: ADR-019 GTD pack
    adr_020: Compatibility marker for requested request-DSL filename
    adr_021: ADR-021 memory pack
    adr_023: ADR-023 pack verb surface
    adr_025: ADR-025 verb speech-act taxonomy
    adr_027: ADR-027 dynamic pack loading and single-tool MCP surface
    adr_033: ADR-033 recall configurability
    adr_043: ADR-043 embedding model migration
    smoke: end-to-end smoke coverage ported from tests/smoke_test.py
    golden: golden snapshot comparison
    benchmark: latency benchmark
    slow: slower subprocess or CLI integration
    manifest: package self-audit tests
    xfail_pending_adr: executable spec for accepted ADR behavior not yet implemented
    search_filters: property and tag predicate filters for the search verb (#225, #260)
